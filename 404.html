<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found – Daro's Enclave</title>
    <link rel="icon" href="/assets/Logo.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <meta name="theme-color" content="#4b2e2a" />
    <meta name="robots" content="noindex" />
    <script>
      (function () {
        var path = window.location.pathname;

        // Redirect old colon-based blog URL to the correct hyphenated version
        if (path.indexOf("10:best:things:to:do:in:mirissa") !== -1) {
          window.location.replace("https://www.darosenclave.com/blogs/10-best-things-to-do-in-mirissa");
          return;
        }

        // Redirect /blog and /blog.html to /blogs
        if (path === "/blog" || path === "/blog.html") {
          window.location.replace("https://www.darosenclave.com/blogs");
          return;
        }
      })();
    </script>
  </head>
  <body>
    <header>
      <a href="/" class="logo-link">
        <img src="/assets/Logo.webp" alt="Daro's Enclave" style="height:48px;" />
      </a>
    </header>
    <main style="text-align:center; padding: 80px 24px;">
      <h1 style="font-family:'Playfair Display',serif;">Page Not Found</h1>
      <p style="font-family:'Inter',sans-serif; color:#6b4c3b;">The page you are looking for has moved or no longer exists.</p>
      <a href="/" style="font-family:'Inter',sans-serif; color:#4b2e2a; font-weight:600;">Return to Home</a>
    </main>
  </body>
</html>
